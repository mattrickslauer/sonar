name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  app:
    name: app (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          # The app build doesn't call the session signer, but provide a valid
          # secret + public vars so nothing trips. Real values come from the
          # deploy platform (Vercel) / repo secrets.
          SONAR_SESSION_SECRET: ${{ secrets.SONAR_SESSION_SECRET || 'ci-placeholder-secret-at-least-32-characters' }}
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.ci-placeholder
          NEXT_PUBLIC_WS_URL: wss://ci.example/live

  infra:
    name: infra (typecheck · cdk synth)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx cdk synth --quiet
        env:
          # The WS authorizer guard requires this at synth time (fails closed).
          SONAR_SESSION_SECRET: ${{ secrets.SONAR_SESSION_SECRET || 'ci-placeholder-secret-at-least-32-characters' }}
